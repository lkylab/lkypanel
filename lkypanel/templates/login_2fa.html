{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification - LKYPanel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 2.5rem;
            color: var(--accent-primary);
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem; }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-dim); margin-bottom: 0.5rem; }
        
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            color: white;
            font-size: 1.25rem;
            letter-spacing: 0.25em;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--accent-primary); background: rgba(255, 255, 255, 0.08); }

        .btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><i class="ph-bold ph-shield-check"></i></div>
        <h1>Two-Factor Auth</h1>
        <p>Enter the 6-digit code from your authenticator app to continue.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label for="code">Verification Code</label>
                <input type="text" name="code" id="code" maxlength="6" pattern="\d{6}" placeholder="000000" required autofocus>
            </div>
            <button type="submit" class="btn">Verify & Login</button>
        </form>
        
        <div style="margin-top: 1.5rem;">
            <a href="/logout/" style="color: var(--text-dim); font-size: 0.85rem; text-decoration: none;">Cancel and Logout</a>
        </div>
    </div>
</body>
</html>
